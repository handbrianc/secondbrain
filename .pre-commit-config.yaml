# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Use local mypy to access installed packages from venv
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        args: [--config-file=pyproject.toml, src]
        pass_filenames: false

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.15
    hooks:
      - id: vulture
        args: [--min-confidence=80, src, --ignore-names, "cls,exc_type,exc_val,exc_tb"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        entry: bandit -r src/secondbrain -c pyproject.toml
        pass_filenames: false

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  - repo: https://github.com/CycloneDX/cyclonedx-python
    rev: v7.6.2
    hooks:
      - id: cyclonedx-bom
        args: [--format, JSON, --output-file, sbom.json, -o, sbom.json]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
