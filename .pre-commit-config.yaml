# See https://pre-commit.com for more information
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml, src]

  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.15
    hooks:
      - id: vulture
        args: [--min-confidence=80, src, --ignore-names, "cls,exc_type,exc_val,exc_tb"]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "src/secondbrain"]

  - repo: local
    hooks:
      - id: sbom-analysis
        name: Generate SBOM and License Risk Analysis
        entry: python3 scripts/generate_sbom_analysis.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pytest
        name: pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
