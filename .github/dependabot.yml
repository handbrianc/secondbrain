# Dependabot configuration for automated dependency updates
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Limit major version updates but don't ignore them completely
    ignore:
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sentence-transformers"
        update-types: ["version-update:semver-major"]
    groups:
      production-dependencies:
        patterns:
          - "click"
          - "docling"
          - "docling-core"
          - "pymongo"
          - "motor"
          - "httpx"
          - "pydantic"
          - "pydantic-settings"
          - "rich"
          - "python-dotenv"
          - "sentence-transformers"
          - "numpy"
          - "torch"
          - "opentelemetry-api"
          - "opentelemetry-sdk"
          - "ollama"
          - "openai"
          - "typing_extensions"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
