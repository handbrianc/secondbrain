name: Test Quality Gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (fast path)
        run: |
          pytest -m "unit" -v --tb=short

      - name: Run integration tests with coverage
        run: |
          pytest -m "integration" \
            --cov=secondbrain \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v --tb=short

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Run mutation testing (sample)
        run: |
          # Run mutation testing on critical module only (full run takes too long)
          mutmut run --paths-to-mutate secondbrain.rag.factory \
            --runner="pytest {mutmut_test_file} -xvs"
          mutmut results
        timeout-minutes: 30

      - name: Upload mutation results
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results-${{ matrix.python-version }}
          path: .mutmut-cache

  flaky-test-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with flaky detection
        run: |
          pytest -m "flaky" \
            --reruns=3 \
            --reruns-delay=2 \
            -v --tb=short

  performance-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run performance tests
        run: |
          pytest -m "performance" \
            --benchmark-autosave \
            --benchmark-compare \
            -v --tb=short

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .benchmarks/
