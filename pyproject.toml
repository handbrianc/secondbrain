[project]
name = "secondbrain"
version = "0.1.0"
description = "A local document intelligence CLI tool for semantic search"
requires-python = ">=3.11"
authors = [
    {name = "Developer", email = "dev@example.com"}
]
license = {text = "MIT"}
readme = "README.md"
keywords = ["cli", "document", "embedding", "ollama", "mongodb", "vector-search"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "click>=8.1.0",
    "docling>=2.77.0",
    "docling-core>=2.48.4",
    "pymongo>=4.6.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "rich>=14.0.0",
    "python-dotenv>=1.2.2",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.15.5",
    "mypy>=1.8.0",
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-benchmark>=4.0.0",
    "bandit>=1.7.0",
    "safety>=3.0.0",
    "pre-commit>=3.6.0",
    "pyinstaller>=6.0.0",
    "mongomock>=4.0.0",
    "vulture>=2.11",
    "cyclonedx-bom>=7.0.0",
    "mkdocs>=1.6.0",
    "mkdocstrings>=0.24.0",
    "mkdocstrings-python>=2.0.0",
    "mkdocs-material>=9.5.0",
]

[project.scripts]
secondbrain = "secondbrain.cli:main"

[build-system]
requires = ["setuptools>=65.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint]
extend-select = ["I"]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM", "PTH", "RUF"]
ignore = []
extend-ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"examples/**" = ["ANN", "E501", "SIM"]  # Examples prioritize readability over strict typing

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
check_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
exclude = ["venv/", ".git/", "tests/", ".*\\.egg-info/"]


[tool.coverage.run]
source = ["src"]
omit = ["*/tests/*", "*/test_*.py"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

[tool.bandit]
skips = ["B101", "B602"]
exclude_dirs = ["tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=secondbrain --cov-report=term-missing --cov-fail-under=80"
asyncio_mode = "auto"
markers = ["integration: marks tests as integration tests that require external services"]

[tool.pre-commit]
default_stages = ["pre-commit"]

[tool.vulture]
paths = ["src"]
ignore_decorators = ["@pytest.*"]
ignore_names = [
    "test_*",
    "setUp",
    "tearDown",
    "setUpModule",
    "tearDownModule",
    "cls",           # Classmethod first parameter (false positive)
    "exc_type",      # Exception context in __exit__ (false positive)
    "exc_val",
    "exc_tb",
    "info",          # Context manager info parameter (false positive)
]
min_confidence = 80
exclude = ["venv/*", ".git/*", "tests/*", "scripts/*"]
sort_by_size = true
verbose = false
