# Test environment docker-compose configuration
# Memory Requirements: sentence-transformers service requires 4GB minimum
# The all-MiniLM-L6-v2 model requires ~1.2GB RAM; 4GB provides headroom
name: secondbrain-test

services:
  mongodb:
    image: mongo:7.0.34
    container_name: secondbrain-mongodb-test
    hostname: mongodb
    ports:
      - "27018:27017"  # Different from dev port (27017)
    environment:
      MONGO_INITDB_DATABASE: secondbrain_test
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
    volumes:
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secondbrain-test-network

volumes:
  mongo_test_data:
    driver: local

networks:
  secondbrain-test-network:
    driver: bridge
