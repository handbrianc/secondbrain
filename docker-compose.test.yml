services:
  mongodb:
    image: mongo:6.0
    container_name: secondbrain-mongodb-test
    hostname: mongodb
    ports:
      - "27018:27017"  # Different from dev port (27017)
    environment:
      MONGO_INITDB_DATABASE: secondbrain_test
    volumes:
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - secondbrain-test-network

  sentence-transformers:
    image: sentence-transformers/server:latest
    container_name: secondbrain-embeddings-test
    hostname: sentence-transformers
    ports:
      - "11435:8000"  # Different from dev port (11434)
    environment:
      MODEL_NAME: all-MiniLM-L6-v2
    volumes:
      - model_cache:/root/.cache
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - secondbrain-test-network

volumes:
  mongo_test_data:
  model_cache:

networks:
  secondbrain-test-network:
    driver: bridge
