# Test environment docker-compose configuration
# Memory Requirements: Ollama service requires 10GB minimum for LLM model
# The llama3.1:latest model requires ~4.8GB RAM; 10GB provides headroom
name: secondbrain-test

services:
  mongodb:
    image: mongo:7.0.34
    container_name: secondbrain-mongodb-test
    hostname: mongodb
    ports:
      - "27018:27017"  # Different from dev port (27017)
    environment:
      MONGO_INITDB_DATABASE: secondbrain_test
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
    volumes:
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secondbrain-test-network

  ollama:
    image: ollama/ollama:latest
    container_name: secondbrain-ollama-test
    hostname: ollama
    ports:
      - "11435:11434"  # Different from dev port (11434)
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-startup.sh:/startup.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    entrypoint: ["/startup.sh"]
    mem_limit: 10g
    memswap_limit: 10g
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", 'pgrep -f "ollama serve" > /dev/null && exit 0 || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 300s
    networks:
      - secondbrain-test-network

volumes:
  mongo_test_data:
    driver: local
  ollama_data:
    driver: local

networks:
  secondbrain-test-network:
    driver: bridge
