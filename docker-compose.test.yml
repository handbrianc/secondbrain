name: secondbrain-test

services:
  mongodb:
    image: mongo:8.0
    container_name: secondbrain-mongodb-test
    hostname: mongodb
    ports:
      - "27018:27017"  # Different from dev port (27017)
    environment:
      MONGO_INITDB_DATABASE: secondbrain_test
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
    volumes:
      - mongo_test_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secondbrain-test-network

  ollama:
    image: ollama/ollama:latest
    container_name: secondbrain-ollama-test
    hostname: ollama
    ports:
      - "11435:11434"  # Different from dev port (11434)
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "bash", "-c", "timeout 2 bash -c 'echo > /dev/tcp/127.0.0.1/11434' && echo 'healthy' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - secondbrain-test-network

volumes:
  mongo_test_data:
  ollama_data:

networks:
  secondbrain-test-network:
    driver: bridge
