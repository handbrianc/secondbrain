services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: secondbrain-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - secondbrain-network

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: secondbrain-mcp
    environment:
      - SECONDBRAIN_MONGO_URI=mongodb://admin:${MONGODB_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/
      - SECONDBRAIN_LOCAL_EMBEDDING_MODEL=${SECONDBRAIN_LOCAL_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - SECONDBRAIN_CHUNK_SIZE=${SECONDBRAIN_CHUNK_SIZE:-512}
      - SECONDBRAIN_CHUNK_OVERLAP=${SECONDBRAIN_CHUNK_OVERLAP:-50}
    depends_on:
      mongodb:
        condition: service_started
    networks:
      - secondbrain-network
    # MCP servers typically run via stdio, so no ports exposed
    # The MCP client connects via stdin/stdout
    # Override CMD to run CLI commands:
    # docker-compose run --rm mcp secondbrain --help
    # docker-compose run --rm mcp secondbrain ingest /path/to/docs
    # docker-compose run --rm mcp secondbrain search "your query"
    volumes:
      # Mount local documents directory for ingestion
      - ./docs:/docs:ro

volumes:
  mongodb-data:
  mongodb-configdb:
  mongot-data:

networks:
  secondbrain-network:
    driver: bridge
