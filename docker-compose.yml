services:
  mongodb:
    image: mongodb/mongodb-atlas-local:latest
    container_name: secondbrain-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGODB_INITDB_ROOT_USERNAME:-admin}
      - MONGODB_INITDB_ROOT_PASSWORD=${MONGODB_INITDB_ROOT_PASSWORD:-admin123}
    volumes:
      - mongodb-data:/data/db
      - mongodb-configdb:/data/configdb
      - mongot-data:/data/mongot
    networks:
      - secondbrain-network

volumes:
  mongodb-data:
  mongodb-configdb:
  mongot-data:

networks:
  secondbrain-network:
    driver: bridge
