services:
  mongodb:
    image: mongo:7.0.34
    container_name: secondbrain-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    command: mongod --auth --bind_ip_all
    volumes:
      - mongodb-data:/data/db
      - mongodb-configdb:/data/configdb
      - mongot-data:/data/mongot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secondbrain-network

volumes:
  mongodb-data:
  mongodb-configdb:
  mongot-data:

networks:
  secondbrain-network:
    driver: bridge
