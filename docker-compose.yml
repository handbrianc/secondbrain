# docker-compose.yml for secondbrain development environment
services:
  ollama:
    image: ollama/ollama:latest
    container_name: secondbrain-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    networks:
      - secondbrain-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  ollama-data:

networks:
  secondbrain-network:
    driver: bridge
