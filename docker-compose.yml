services:
  mongodb:
    image: mongo:8.0
    container_name: secondbrain-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=${MONGODB_INITDB_ROOT_USERNAME:-admin}
      - MONGODB_INITDB_ROOT_PASSWORD=${MONGODB_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongodb-data:/data/db
      - mongodb-configdb:/data/configdb
      - mongot-data:/data/mongot
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - secondbrain-network

volumes:
  mongodb-data:
  mongodb-configdb:
  mongot-data:

networks:
  secondbrain-network:
    driver: bridge
